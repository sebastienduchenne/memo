<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/vue"></script> <!-- import de vue.js -->
  </head>
  <body>
    <div id="app"> <!-- view -->
      <p>{{ message }}</p>
      <p>{{ toto }}</p>
    </div>
    <script>
      const data = { // model
        message: "Hello World !",
        toto: "titi"
      };
      new Vue({ // view model
        el: "#app", // view, el = element
        data: data  // model
      });
    </script>
  </body>
</html>
