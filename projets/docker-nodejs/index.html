<!DOCTYPE html>
<html>
    <head>
        <title>Page Title</title>
        <script src="./jquery.min.js"></script>
    </head>
    <body>

        <button type="button" onclick="listEvents()">get all events</button>
        <button type="button" onclick="getEvent()">get event</button>
        <button type="button" onclick="addEvent()">add event</button>
        <button type="button" onclick="updateEvent(3)">update event</button>
        <button type="button" onclick="deleteEvent(3)">delete event</button>
        <div id="result"></div>
        
        <script>
            function result(res){
                document.getElementById("result").innerHTML = res;
            }

            function listEvents(){
                $.ajax({
                    dataType: "html",
                    type: "GET",
                    url: "http://localhost:3000/events",
                    success: function(result,data) { 
                        $("#result").text(result)
                    }
                });
            }

            function getEvent(){
                $.ajax({
                    dataType: "html",
                    type: "GET",
                    url: "http://localhost:3000/events/2",
                    success: function(result,data) { $("#result").text(result)}
                });
            }

            function addEvent(){
                $.ajax({
                    dataType: "html",
                    url: "http://localhost:3000/events",
                    type: "POST",
                    data: {title:"hgnvsdn"},
                    success: function(result,data) { $("#result").text(result)}
                });
            }

            function updateEvent(){
                $.ajax({
                    dataType: "html",
                    type: "POST",
                    url: "http://localhost:3000/events/2",
                    data: {title:"titi"},
                    success: function(result,data) { $("#result").text(result)}
                });
            }

            function deleteEvent(){
                $.ajax({
                    dataType: "html",
                    type: "DELETE",
                    url: "http://localhost:3000/events/2",
                    success: function(result,data) { $("#result").text(result)}
                });
            }
        </script>

    </body>
</html>
