version: '3.3'
services:
    app:
        build: .
        depends_on: 
            - db
        ports:
            - "3301:3301"
        networks:
            - res
    db:
        image: mysql:5.7
        ports:
            - "3306:3306"
        expose:
            - "3306"
        environment:
            - MYSQL_DATABASE=database
            - MYSQL_USER=database
            - MYSQL_PASSWORD=database
            - MYSQL_ROOT_PASSWORD=database
        networks:
            - res
networks:
    res:
